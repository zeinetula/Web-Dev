<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
    .fb-logo {
        position: absolute;
        top: 300px;
        left: 200px;
        width: 300px;
    }
        .bottom-text {
            position: fixed;
            bottom: 300px;
            right: 420px;
            width: 100%;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #555;
        }
        .login-box {
            position: absolute;
            top: 270px;
            right: 400px;
            width: 260px;
            padding: 20px;
            border: 1px outset #f4f4f4;
            border-radius: 8px;
            font-family: Arial, sans-serif;
        }

        .login-box input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            
            
        }

        .login-box button {
            
            padding: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            font-weight: bold;

        }
         .btn-login {
        width: 100%;
        border: none;
        border-radius: 4px;
        background-color: rgb(24, 119, 242);
        color:white

        }

        .btn-forgot {
            width: 100%;
            border:outset;
            border-radius: 1%;
            color:rgb(24, 119, 242);
            background-color: white;
        }
        .btn-reg {
            
            border: none;
            color:white;
            background-color:rgb(32, 180, 32);
        }
        .right-text{
            font: optional;
            position: fixed;
            right:420px;
            bottom: 150px;

        }
        
    </style>
</head>
<body>

    <img 
    class="fb-logo" 
    src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Facebook_Logo_%282019%29.svg/1280px-Facebook_Logo_%282019%29.svg.png" 
    alt="Facebook Logo"

    >
    <div class="bottom-text">
        Facebook помогает вам всегда <br> оставаться на связи и общаться со<br> своими знакомыми
    </div>
    <div class="login-box">
        <input type="text" placeholder="Электронный адрес или номер телефона">
        <input type="password" placeholder="Пароль">
        <button class="btn-login">Войти</button>
        <button class="btn-forgot">Забыл пароль</button>
        <button class="btn-reg">Создать новый аккаунт</button>

    </div>
    <div class="right-text">
     <b>Создать Страницу</b> знаменитости,<br> музыкальной группы или компании
    </div>
    
</body>
</html>
