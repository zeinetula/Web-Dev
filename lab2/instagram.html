<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Style Split</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Главный контейнер на весь экран */
        .main-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* Левая половина */
        .left-half {
            flex: 1;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-right: 1px solid #dbdbdb;
        }

        .left-half h1 {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 30px;
            text-align: center;
        }

        .gradient {
            background: linear-gradient(to right, #f9ce34, #ee2a7b, #6228d7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .left-half img {
            max-width: 400px;
            width: 100%;
            height: auto;
        }

        /* Правая половина */
        .right-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 20px;
        }

        /* Сама форма (ограничиваем ширину, чтобы не была слишком растянутой) */
        .form-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .login-box, .register-box {
            border:none;
            padding: 30px 40px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
        }

        .separator {
            display: flex;
            align-items: center;
            margin: 15px 0;
            color: #8e8e8e;
            font-size: 13px;
        }
        .separator::before, .separator::after {
            content: ""; flex: 1; height: 1px; background: #dbdbdb;
        }
        .separator span { padding: 0 10px; }

        .fb-login {
            color: #385185;
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
        }

        .footer {
            padding: 20px;
            background: #fafafa;
            text-align: center;
            font-size: 12px;
            color: #8e8e8e;
            border-top: 1px solid #dbdbdb;
        }
        .logo-img{
            width:1%;
        }

        @media (max-width: 800px) {
            .left-half { display: none; }
        }
    </style>
</head>
<body>
    <div><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8lv-iEOWtRxGDqsOR-Pa1kIiqN298569zVA&s" style="width: 100px; height: auto;"></div>
    
    <div class="main-wrapper">
        <section class="left-half">
            Посмотрите, какими моментами <br>из жизни поделились ваши <span class="gradient">близкие друзья</span>.</h1>
            <img src="https://static.cdninstagram.com/rsrc.php/v4/yF/r/reN9rvYdLTB.png" alt="Phones">
        </section>

        <section class="right-half">
            <div class="form-container">
                <div class="login-box">
                    
                    Войти в инстаграм
                    <input type="text" placeholder="Телефон, имя пользователя или эл. адрес">
                    <input type="password" placeholder="Пароль">
                    <button class="login-btn">Войти</button>
                    
                    <div class="separator"><span>ИЛИ</span></div>
                    
                    <a href="#" class="fb-login">Войти через Facebook</a>
                    <a href="#" style="display:block; margin-top: 15px; font-size: 12px; color: #00376b; text-decoration: none;">Забыли пароль?</a>
                </div>

                <div class="register-box">
                    <p style="font-size: 14px;">У вас нет аккаунта? <a href="#" style="color: #0095f6; font-weight: 600; text-decoration: none;">Зарегистрироваться</a></p>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        © 2026 Instagram from Meta
    </footer>

</body>
</html>
