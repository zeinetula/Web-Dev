<div class="card">
  <div class="image-container">
    <button class="nav-btn prev" (click)="prevImage()">‹</button>
    <img [src]="currentImage" [alt]="product.name" class="main-img" />
    <button class="nav-btn next" (click)="nextImage()">›</button>
  </div>

  <div class="thumbnails">
    <img
      *ngFor="let img of product.images; let i = index"
      [src]="img"
      [class.active]="i === currentImageIndex"
      (click)="setImage(i)"
      alt="thumbnail"
    />
  </div>

  <div class="content">
    <h3>{{ product.name }}</h3>
    <p class="description">{{ product.description }}</p>

    <div class="meta">
      <div class="price">{{ product.price | number:'1.0-0' }} ₸</div>
      <div class="rating">
        <span *ngFor="let s of stars" class="star" [class.full]="s==='full'" [class.half]="s==='half'">★</span>
        <span class="rating-value">({{ product.rating }})</span>
      </div>
    </div>

    <div class="actions">
      <a [href]="product.link" target="_blank" class="btn primary">Kaspi</a>
      <button class="btn whatsapp" (click)="shareToWhatsApp()">whatsapp</button>
      <button class="btn telegram" (click)="shareToTelegram()">telegram</button>
    </div>
  </div>
</div>
